<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TrackSplitter</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- FFmpeg -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      color:white;
      overflow-x:hidden;

      font-family:
        Inter,
        "Noto Sans JP",
        sans-serif;

      background:
        radial-gradient(circle at top left,#1e293b 0%,transparent 30%),
        radial-gradient(circle at bottom right,#0f172a 0%,transparent 30%),
        #020617;
    }

    .bg-orb{
      position:fixed;
      border-radius:9999px;
      filter:blur(120px);
      opacity:.15;
      pointer-events:none;
    }

    .orb1{
      width:500px;
      height:500px;
      background:#06b6d4;
      top:-200px;
      left:-150px;
    }

    .orb2{
      width:500px;
      height:500px;
      background:#3b82f6;
      bottom:-200px;
      right:-150px;
    }

    .container{
      position:relative;
      z-index:10;
      max-width:1100px;
      margin:auto;
      padding:40px 20px 80px;
    }

    .topbar{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:20px;
    }

    .lang-btn{
      border:none;
      color:white;
      padding:10px 16px;
      border-radius:14px;
      cursor:pointer;

      background:rgba(255,255,255,.06);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(10px);

      transition:.2s;
    }

    .lang-btn:hover{
      background:rgba(255,255,255,.12);
    }

    .lang-btn.active{
      background:#22d3ee;
      color:#020617;
      font-weight:700;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:72px;
      margin:0 0 16px;
      font-weight:900;
      letter-spacing:-2px;

      background:linear-gradient(
        90deg,
        #22d3ee,
        #3b82f6
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      color:#cbd5e1;
      font-size:20px;
      margin-bottom:16px;
    }

    .privacy{
      color:#67e8f9;
      font-size:14px;
    }

    .glass{
      background:rgba(255,255,255,.05);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(16px);

      border-radius:32px;
    }

    .main-card{
      padding:32px;
    }

    .drop-zone{
      border:2px dashed #475569;
      border-radius:32px;
      padding:80px 30px;
      text-align:center;
      cursor:pointer;

      transition:.25s;
    }

    .drop-zone.drag{
      border-color:#22d3ee;

      transform:scale(1.01);

      box-shadow:
        0 0 30px rgba(34,211,238,.25);
    }

    .drop-zone svg{
      width:90px;
      height:90px;
      color:#22d3ee;
      margin-bottom:20px;
    }

    .drop-title{
      font-size:36px;
      font-weight:700;
      margin-bottom:14px;
    }

    .drop-desc{
      max-width:700px;
      margin:auto;
      color:#94a3b8;
      line-height:1.7;
      margin-bottom:34px;
    }

    .primary-btn{
      border:none;
      padding:18px 34px;
      border-radius:20px;

      background:#22d3ee;

      color:#020617;

      font-size:18px;
      font-weight:700;

      cursor:pointer;

      transition:.2s;
    }

    .primary-btn:hover{
      background:#67e8f9;
      transform:translateY(-2px);
    }

    .selected-file{
      margin-bottom:30px;
    }

    .selected-label{
      color:#22d3ee;
      margin-bottom:10px;
    }

    .selected-name{
      font-size:28px;
      font-weight:700;
      word-break:break-all;
    }

    .selected-size{
      margin-top:10px;
      color:#94a3b8;
    }

    .options{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-top:32px;
    }

    .option-box{
      padding:22px;
    }

    .option-label{
      color:#22d3ee;
      font-size:14px;
      margin-bottom:14px;
    }

    .range-wrap{
      display:flex;
      align-items:center;
      gap:14px;
    }

    input[type="range"]{
      width:100%;
      accent-color:#22d3ee;
    }

    .toggle{
      display:flex;
      align-items:center;
      gap:14px;
      font-size:20px;
      font-weight:700;
    }

    .toggle input{
      width:22px;
      height:22px;
    }

    .process-area{
      margin-top:30px;
    }

    .process-btn{
      width:100%;
      border:none;

      background:linear-gradient(
        90deg,
        #06b6d4,
        #2563eb
      );

      color:white;

      padding:24px;
      border-radius:24px;

      font-size:22px;
      font-weight:800;

      cursor:pointer;

      transition:.2s;
    }

    .process-btn:hover{
      opacity:.9;
      transform:translateY(-2px);
    }

    .process-btn:disabled{
      opacity:.3;
      cursor:not-allowed;
      transform:none;
    }

    .status-box{
      margin-top:34px;
      display:none;
    }

    .status-head{
      display:flex;
      justify-content:space-between;
      margin-bottom:12px;
      color:#cbd5e1;
      font-size:14px;
    }

    .progress-wrap{
      width:100%;
      height:16px;
      background:#0f172a;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      width:0%;

      background:linear-gradient(
        90deg,
        #22d3ee,
        #3b82f6
      );

      transition:.2s linear;
    }

    .result-box{
      margin-top:34px;
      display:none;
    }

    .result-inner{
      padding:26px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .result-title{
      font-size:28px;
      font-weight:800;
      color:#67e8f9;
    }

    .result-desc{
      margin-top:8px;
      color:#94a3b8;
    }

    .download-btn{
      border:none;
      padding:18px 30px;
      border-radius:20px;

      background:#22d3ee;
      color:#020617;

      font-size:18px;
      font-weight:800;

      cursor:pointer;
    }

    .footer{
      margin-top:40px;
      text-align:center;
      color:#64748b;
      font-size:14px;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:52px;
      }

      .drop-title{
        font-size:28px;
      }

      .main-card{
        padding:20px;
      }

      .drop-zone{
        padding:60px 20px;
      }
    }

  </style>
</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container">

  <!-- language -->
  <div class="topbar">

    <button id="jpBtn"
      class="lang-btn active">
      日本語
    </button>

    <button id="enBtn"
      class="lang-btn">
      EN
    </button>

  </div>

  <!-- hero -->
  <div class="hero">

    <h1>TrackSplitter</h1>

    <div id="subtitle"
      class="subtitle">
      音楽ファイルを自動分割・音量調整・ZIP出力
    </div>

    <div id="privacy"
      class="privacy">
      ファイルはサーバーに送信されません。すべてブラウザ内で処理されます。
    </div>

  </div>

  <!-- card -->
  <div class="glass main-card">

    <!-- drop -->
    <div id="dropZone"
      class="drop-zone">

      <input
        type="file"
        id="fileInput"
        accept="audio/*"
        hidden>

      <div id="dropContent">

        <svg xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M9 17v-6h13v6M9 17H5a2 2 0 01-2-2V7a2 2 0 012-2h4m0 12v2m0-2h13m0 0v2m0-2a2 2 0 002-2V9a2 2 0 00-2-2h-4m0 0V5m0 2H9m11 0h-4"/>

        </svg>

        <div id="dropTitle"
          class="drop-title">
          音楽ファイルをドラッグ
        </div>

        <div id="dropDesc"
          class="drop-desc">
          無音検出で自動分割し、フェードアウトや音量調整を適用してZIPで出力します。
        </div>

        <div id="selectedFile"
          class="selected-file"
          style="display:none;">

          <div id="selectedLabel"
            class="selected-label">
            選択中ファイル
          </div>

          <div id="selectedName"
            class="selected-name"></div>

          <div id="selectedSize"
            class="selected-size"></div>

        </div>

        <button id="selectBtn"
          class="primary-btn">
          ファイルを選択
        </button>

      </div>

    </div>

    <!-- options -->
    <div class="options">

      <!-- fade -->
      <div class="glass option-box">

        <div id="fadeLabel"
          class="option-label">
          フェードアウト
        </div>

        <div class="range-wrap">

          <input type="range"
            id="fadeRange"
            min="0"
            max="5000"
            value="2000">

          <div id="fadeValue">
            2.0秒
          </div>

        </div>

      </div>

      <!-- silence -->
      <div class="glass option-box">

        <div id="silenceLabel"
          class="option-label">
          無音追加
        </div>

        <div class="range-wrap">

          <input type="range"
            id="silenceRange"
            min="0"
            max="3000"
            value="1000">

          <div id="silenceValue">
            1.0秒
          </div>

        </div>

      </div>

      <!-- normalize -->
      <div class="glass option-box">

        <div id="normalizeLabel"
          class="option-label">
          音量自動調整
        </div>

        <label class="toggle">

          <input type="checkbox"
            id="normalizeToggle"
            checked>

          <span id="normalizeText">
            ON
          </span>

        </label>

      </div>

    </div>

    <!-- process -->
    <div class="process-area">

      <button id="processBtn"
        class="process-btn"
        disabled>

        処理開始

      </button>

    </div>

    <!-- status -->
    <div id="statusBox"
      class="status-box">

      <div class="status-head">

        <div id="statusText">
          準備中...
        </div>

        <div id="statusPercent">
          0%
        </div>

      </div>

      <div class="progress-wrap">

        <div id="progressBar"
          class="progress-bar"></div>

      </div>

    </div>

    <!-- result -->
    <div id="resultBox"
      class="result-box">

      <div class="glass result-inner">

        <div>

          <div id="resultTitle"
            class="result-title">
            完了
          </div>

          <div id="resultDesc"
            class="result-desc">
            0曲を書き出しました
          </div>

        </div>

        <button id="downloadBtn"
          class="download-btn">

          ZIPをダウンロード

        </button>

      </div>

    </div>

  </div>

  <div class="footer">
    Built for soundtrack collectors, retro gamers, DJs and archive enthusiasts.
  </div>

</div>

<script>

  // =========================================
  // language
  // =========================================

  let currentLang = "jp";

  const texts = {

    jp:{
      subtitle:"音楽ファイルを自動分割・音量調整・ZIP出力",
      privacy:"ファイルはサーバーに送信されません。すべてブラウザ内で処理されます。",
      dropTitle:"音楽ファイルをドラッグ",
      dropDesc:"無音検出で自動分割し、フェードアウトや音量調整を適用してZIPで出力します。",
      select:"ファイルを選択",
      selected:"選択中ファイル",
      fade:"フェードアウト",
      silence:"無音追加",
      normalize:"音量自動調整",
      process:"処理開始",
      complete:"処理完了",
      exported:"曲を書き出しました",
      download:"ZIPをダウンロード"
    },

    en:{
      subtitle:"Auto Split • Normalize • ZIP Export",
      privacy:"Your files never leave your browser.",
      dropTitle:"Drop Your Audio File",
      dropDesc:"Automatically detect silence, split tracks, normalize volume and export ZIP files.",
      select:"Select File",
      selected:"Selected File",
      fade:"Fade Out",
      silence:"Silence Gap",
      normalize:"Auto Normalize",
      process:"Start Processing",
      complete:"Completed",
      exported:"tracks exported",
      download:"Download ZIP"
    }

  };

  function applyLanguage(){

    const t = texts[currentLang];

    subtitle.textContent = t.subtitle;
    privacy.textContent = t.privacy;

    dropTitle.textContent = t.dropTitle;
    dropDesc.textContent = t.dropDesc;

    selectBtn.textContent = t.select;

    selectedLabel.textContent = t.selected;

    fadeLabel.textContent = t.fade;
    silenceLabel.textContent = t.silence;
    normalizeLabel.textContent = t.normalize;

    processBtn.textContent = t.process;

    resultTitle.textContent = t.complete;

    downloadBtn.textContent = t.download;

    jpBtn.classList.toggle(
      "active",
      currentLang === "jp"
    );

    enBtn.classList.toggle(
      "active",
      currentLang === "en"
    );

    updateRangeLabels();
  }

  jpBtn.onclick = ()=>{

    currentLang = "jp";

    applyLanguage();
  };

  enBtn.onclick = ()=>{

    currentLang = "en";

    applyLanguage();
  };

  // =========================================
  // ranges
  // =========================================

  function updateRangeLabels(){

    fadeValue.textContent =
      (fadeRange.value / 1000).toFixed(1)
      + (currentLang==="jp" ? "秒" : "s");

    silenceValue.textContent =
      (silenceRange.value / 1000).toFixed(1)
      + (currentLang==="jp" ? "秒" : "s");
  }

  fadeRange.oninput = updateRangeLabels;
  silenceRange.oninput = updateRangeLabels;

  // =========================================
  // normalize toggle
  // =========================================

  normalizeToggle.onchange = ()=>{

    normalizeText.textContent =
      normalizeToggle.checked
      ? "ON"
      : "OFF";
  };

  // =========================================
  // file
  // =========================================

  let selectedFile = null;
  let zipBlob = null;

  selectBtn.onclick = ()=>{

    fileInput.click();
  };

  fileInput.onchange = e=>{

    if(e.target.files[0]){

      setFile(e.target.files[0]);
    }
  };

  function setFile(file){

    selectedFile = file;

    processBtn.disabled = false;

    selectedFile.style = "display:block;";

    document.getElementById(
      "selectedName"
    ).textContent = file.name;

    document.getElementById(
      "selectedSize"
    ).textContent =
      (file.size/1024/1024).toFixed(2)
      + " MB";
  }

  // =========================================
  // drag
  // =========================================

  dropZone.addEventListener(
    "dragover",
    e=>{

      e.preventDefault();

      dropZone.classList.add("drag");
    }
  );

  dropZone.addEventListener(
    "dragleave",
    ()=>{

      dropZone.classList.remove("drag");
    }
  );

  dropZone.addEventListener(
    "drop",
    e=>{

      e.preventDefault();

      dropZone.classList.remove("drag");

      if(e.dataTransfer.files.length){

        setFile(
          e.dataTransfer.files[0]
        );
      }
    }
  );

  // =========================================
  // process demo
  // =========================================

  processBtn.onclick = async ()=>{

    statusBox.style.display = "block";

    resultBox.style.display = "none";

    const stepsJP = [
      "FFmpegを読み込み中...",
      "音声を解析中...",
      "無音を検出中...",
      "曲を分割中...",
      "音量を調整中...",
      "ZIPを生成中..."
    ];

    const stepsEN = [
      "Loading FFmpeg...",
      "Analyzing audio...",
      "Detecting silence...",
      "Splitting tracks...",
      "Normalizing volume...",
      "Generating ZIP..."
    ];

    const steps =
      currentLang==="jp"
      ? stepsJP
      : stepsEN;

    let progress = 0;

    for(let i=0;i<steps.length;i++){

      statusText.textContent =
        steps[i];

      for(let j=0;j<15;j++){

        progress += 1;

        progressBar.style.width =
          progress + "%";

        statusPercent.textContent =
          progress + "%";

        await new Promise(
          r=>setTimeout(r,80)
        );
      }
    }

    progressBar.style.width = "100%";

    statusPercent.textContent = "100%";

    resultBox.style.display = "block";

    const trackCount = 18;

    const t = texts[currentLang];

    resultDesc.textContent =
      currentLang==="jp"
      ? `${trackCount}${t.exported}`
      : `${trackCount} ${t.exported}`;

    // dummy zip

    const zip = new JSZip();

    zip.file(
      "readme.txt",
      "TrackSplitter"
    );

    zipBlob = await zip.generateAsync({
      type:"blob"
    });
  };

  // =========================================
  // download
  // =========================================

  downloadBtn.onclick = ()=>{

    if(!zipBlob) return;

    const a =
      document.createElement("a");

    a.href =
      URL.createObjectURL(zipBlob);

    a.download = "tracks.zip";

    a.click();
  };

  // init

  applyLanguage();

</script>

</body>
</html>
