<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TrackSplitter</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- lamejs -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  color:white;
  overflow-x:hidden;

  font-family:
    Inter,
    "Noto Sans JP",
    sans-serif;

  background:
    radial-gradient(circle at top left,#1e293b 0%,transparent 30%),
    radial-gradient(circle at bottom right,#0f172a 0%,transparent 30%),
    #020617;
}

.bg-orb{
  position:fixed;
  border-radius:9999px;
  filter:blur(120px);
  opacity:.15;
  pointer-events:none;
}

.orb1{
  width:500px;
  height:500px;
  background:#06b6d4;
  top:-200px;
  left:-150px;
}

.orb2{
  width:500px;
  height:500px;
  background:#3b82f6;
  bottom:-200px;
  right:-150px;
}

.container{
  position:relative;
  z-index:10;
  max-width:1100px;
  margin:auto;
  padding:40px 20px 80px;
}

.topbar{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:20px;
}

.lang-btn{
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:14px;
  cursor:pointer;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

  transition:.2s;
}

.lang-btn.active{
  background:#22d3ee;
  color:#020617;
  font-weight:700;
}

.hero{
  text-align:center;
  margin-bottom:40px;
}

.hero h1{
  font-size:72px;
  margin:0 0 16px;
  font-weight:900;
  letter-spacing:-2px;

  background:linear-gradient(
    90deg,
    #22d3ee,
    #3b82f6
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#cbd5e1;
  font-size:20px;
  margin-bottom:16px;
}

.privacy{
  color:#67e8f9;
  font-size:14px;
}

.glass{
  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(16px);

  border-radius:32px;
}

.main-card{
  padding:32px;
}

.drop-zone{
  border:2px dashed #475569;
  border-radius:32px;
  padding:80px 30px;
  text-align:center;
  cursor:pointer;

  transition:.25s;
}

.drop-zone.drag{
  border-color:#22d3ee;

  transform:scale(1.01);

  box-shadow:
    0 0 30px rgba(34,211,238,.25);
}

.drop-title{
  font-size:36px;
  font-weight:700;
  margin-bottom:14px;
}

.drop-desc{
  max-width:700px;
  margin:auto;
  color:#94a3b8;
  line-height:1.7;
  margin-bottom:34px;
}

.primary-btn{
  border:none;
  padding:18px 34px;
  border-radius:20px;

  background:#22d3ee;

  color:#020617;

  font-size:18px;
  font-weight:700;

  cursor:pointer;

  transition:.2s;
}

.primary-btn:hover{
  background:#67e8f9;
}

.options{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:32px;
}

.option-box{
  padding:22px;
}

.option-label{
  color:#22d3ee;
  font-size:14px;
  margin-bottom:14px;
}

.range-wrap{
  display:flex;
  align-items:center;
  gap:14px;
}

input[type="range"]{
  width:100%;
  accent-color:#22d3ee;
}

.toggle{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:20px;
  font-weight:700;
}

.process-area{
  margin-top:30px;
}

.process-btn{
  width:100%;
  border:none;

  background:linear-gradient(
    90deg,
    #06b6d4,
    #2563eb
  );

  color:white;

  padding:24px;
  border-radius:24px;

  font-size:22px;
  font-weight:800;

  cursor:pointer;
}

.process-btn:disabled{
  opacity:.3;
  cursor:not-allowed;
}

.status-box{
  margin-top:34px;
  display:none;
}

.status-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  color:#cbd5e1;
}

.progress-wrap{
  width:100%;
  height:16px;
  background:#0f172a;
  border-radius:999px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;

  background:linear-gradient(
    90deg,
    #22d3ee,
    #3b82f6
  );

  transition:.2s linear;
}

.result-box{
  margin-top:34px;
  display:none;
}

.result-inner{
  padding:26px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.result-title{
  font-size:28px;
  font-weight:800;
  color:#67e8f9;
}

.result-desc{
  margin-top:8px;
  color:#94a3b8;
}

.download-btn{
  border:none;
  padding:18px 30px;
  border-radius:20px;

  background:#22d3ee;
  color:#020617;

  font-size:18px;
  font-weight:800;

  cursor:pointer;
}

.selected-file{
  margin-top:20px;
  color:#94a3b8;
}

@media(max-width:768px){

  .hero h1{
    font-size:52px;
  }

  .drop-title{
    font-size:28px;
  }
}

</style>
</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container">

  <div class="topbar">

    <button id="jpBtn"
      class="lang-btn active">
      日本語
    </button>

    <button id="enBtn"
      class="lang-btn">
      EN
    </button>

  </div>

  <div class="hero">

    <h1>TrackSplitter</h1>

    <div id="subtitle"
      class="subtitle">
      音楽ファイルを自動分割・MP3出力
    </div>

    <div id="privacy"
      class="privacy">
      ファイルはサーバーに送信されません。すべてブラウザ内で処理されます。
    </div>

  </div>

  <div class="glass main-card">

    <div id="dropZone"
      class="drop-zone">

      <input
        type="file"
        id="fileInput"
        accept=".mp3,.wav,.flac,.m4a,.ogg"
        hidden>

      <div class="drop-title"
        id="dropTitle">
        音楽ファイルをドラッグ
      </div>

      <div class="drop-desc"
        id="dropDesc">
        MP3 / WAV / FLAC / M4A / OGG
      </div>

      <button id="selectBtn"
        class="primary-btn">
        ファイルを選択
      </button>

      <div id="selectedFile"
        class="selected-file">
      </div>

    </div>

    <div class="options">

      <div class="glass option-box">

        <div class="option-label">
          フェードアウト
        </div>

        <div class="range-wrap">

          <input type="range"
            id="fadeRange"
            min="0"
            max="5000"
            value="2000">

          <div id="fadeValue">
            2.0秒
          </div>

        </div>

      </div>

      <div class="glass option-box">

        <div class="option-label">
          無音追加
        </div>

        <div class="range-wrap">

          <input type="range"
            id="silenceRange"
            min="0"
            max="3000"
            value="1000">

          <div id="silenceValue">
            1.0秒
          </div>

        </div>

      </div>

      <div class="glass option-box">

        <div class="option-label">
          音量自動調整
        </div>

        <label class="toggle">

          <input type="checkbox"
            id="normalizeToggle"
            checked>

          <span id="normalizeText">
            ON
          </span>

        </label>

      </div>

    </div>

    <div class="process-area">

      <button id="processBtn"
        class="process-btn"
        disabled>

        処理開始

      </button>

    </div>

    <div id="statusBox"
      class="status-box">

      <div class="status-head">

        <div id="statusText">
          準備中...
        </div>

        <div id="statusPercent">
          0%
        </div>

      </div>

      <div class="progress-wrap">

        <div id="progressBar"
          class="progress-bar"></div>

      </div>

    </div>

    <div id="resultBox"
      class="result-box">

      <div class="glass result-inner">

        <div>

          <div class="result-title">
            完了
          </div>

          <div id="resultDesc"
            class="result-desc">
          </div>

        </div>

        <button id="downloadBtn"
          class="download-btn">

          ZIPをダウンロード

        </button>

      </div>

    </div>

  </div>

</div>

<script>

let currentLang = "jp";

let selectedFile = null;

let zipBlob = null;

const audioContext =
  new (
    window.AudioContext
    || window.webkitAudioContext
  )();

const texts = {

  jp:{
    processing:"音声を解析中...",
    splitting:"曲を分割中...",
    zipping:"ZIP生成中...",
    complete:"曲を書き出しました"
  },

  en:{
    processing:"Analyzing audio...",
    splitting:"Exporting tracks...",
    zipping:"Generating ZIP...",
    complete:"tracks exported"
  }
};

fadeRange.oninput = ()=>{

  fadeValue.textContent =
    (fadeRange.value / 1000).toFixed(1)
    + "秒";
};

silenceRange.oninput = ()=>{

  silenceValue.textContent =
    (silenceRange.value / 1000).toFixed(1)
    + "秒";
};

normalizeToggle.onchange = ()=>{

  normalizeText.textContent =
    normalizeToggle.checked
    ? "ON"
    : "OFF";
};

selectBtn.onclick = ()=>{

  fileInput.click();
};

fileInput.onchange = e=>{

  if(e.target.files[0]){

    setFile(
      e.target.files[0]
    );
  }
};

function setFile(file){

  selectedFile = file;

  processBtn.disabled = false;

  selectedFileDiv =
    document.getElementById(
      "selectedFile"
    );

  selectedFileDiv.textContent =
    `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
}

dropZone.addEventListener(
  "dragover",
  e=>{

    e.preventDefault();

    dropZone.classList.add("drag");
  }
);

dropZone.addEventListener(
  "dragleave",
  ()=>{

    dropZone.classList.remove("drag");
  }
);

dropZone.addEventListener(
  "drop",
  e=>{

    e.preventDefault();

    dropZone.classList.remove("drag");

    if(e.dataTransfer.files.length){

      setFile(
        e.dataTransfer.files[0]
      );
    }
  }
);

function detectSilence(

  channelData,
  sampleRate,

  threshold = 0.01,
  minSilence = 2

){

  const minSamples =
    sampleRate * minSilence;

  const silenceRanges = [];

  let silenceStart = null;

  for(
    let i=0;
    i<channelData.length;
    i++
  ){

    if(
      Math.abs(channelData[i])
      < threshold
    ){

      if(silenceStart === null){

        silenceStart = i;
      }

    }else{

      if(silenceStart !== null){

        const silenceLength =
          i - silenceStart;

        if(
          silenceLength
          >= minSamples
        ){

          silenceRanges.push({

            start:
              silenceStart / sampleRate,

            end:
              i / sampleRate
          });
        }

        silenceStart = null;
      }
    }
  }

  return silenceRanges;
}

function audioBufferToWav(buffer){

  const numChannels =
    buffer.numberOfChannels;

  const sampleRate =
    buffer.sampleRate;

  const format = 1;

  const bitDepth = 16;

  const samples =
    buffer.length * numChannels;

  const blockAlign =
    numChannels * bitDepth / 8;

  const byteRate =
    sampleRate * blockAlign;

  const dataSize =
    samples * bitDepth / 8;

  const bufferLength =
    44 + dataSize;

  const arrayBuffer =
    new ArrayBuffer(bufferLength);

  const view =
    new DataView(arrayBuffer);

  function writeString(
    view,
    offset,
    string
  ){

    for(
      let i=0;
      i<string.length;
      i++
    ){

      view.setUint8(
        offset + i,
        string.charCodeAt(i)
      );
    }
  }

  writeString(view,0,"RIFF");

  view.setUint32(
    4,
    36 + dataSize,
    true
  );

  writeString(view,8,"WAVE");

  writeString(view,12,"fmt ");

  view.setUint32(16,16,true);

  view.setUint16(20,format,true);

  view.setUint16(
    22,
    numChannels,
    true
  );

  view.setUint32(
    24,
    sampleRate,
    true
  );

  view.setUint32(
    28,
    byteRate,
    true
  );

  view.setUint16(
    32,
    blockAlign,
    true
  );

  view.setUint16(
    34,
    bitDepth,
    true
  );

  writeString(view,36,"data");

  view.setUint32(
    40,
    dataSize,
    true
  );

  let offset = 44;

  for(
    let i=0;
    i<buffer.length;
    i++
  ){

    for(
      let ch=0;
      ch<numChannels;
      ch++
    ){

      let sample =
        buffer
        .getChannelData(ch)[i];

      sample =
        Math.max(-1,
        Math.min(1,sample));

      view.setInt16(

        offset,

        sample < 0
        ? sample * 0x8000
        : sample * 0x7FFF,

        true
      );

      offset += 2;
    }
  }

  return arrayBuffer;
}

function wavToMp3(

  wavBuffer,
  channels = 2,
  sampleRate = 44100,
  kbps = 192

){

  const wav =
    lamejs.WavHeader.readHeader(
      new DataView(wavBuffer)
    );

  const samples =
    new Int16Array(
      wavBuffer,
      wav.dataOffset,
      wav.dataLen / 2
    );

  const mp3encoder =
    new lamejs.Mp3Encoder(
      channels,
      sampleRate,
      kbps
    );

  const blockSize = 1152;

  let mp3Data = [];

  for(
    let i=0;
    i<samples.length;
    i += blockSize
  ){

    const chunk =
      samples.subarray(
        i,
        i + blockSize
      );

    const mp3buf =
      mp3encoder.encodeBuffer(chunk);

    if(mp3buf.length > 0){

      mp3Data.push(
        new Int8Array(mp3buf)
      );
    }
  }

  const end =
    mp3encoder.flush();

  if(end.length > 0){

    mp3Data.push(
      new Int8Array(end)
    );
  }

  return new Blob(
    mp3Data,
    { type:"audio/mp3" }
  );
}

processBtn.onclick = async ()=>{

  if(!selectedFile) return;

  statusBox.style.display = "block";

  resultBox.style.display = "none";

  progressBar.style.width = "10%";

  statusPercent.textContent = "10%";

  statusText.textContent =
    texts[currentLang].processing;

  const arrayBuffer =
    await selectedFile.arrayBuffer();

  const audioBuffer =
    await audioContext.decodeAudioData(
      arrayBuffer
    );

  const channelData =
    audioBuffer.getChannelData(0);

  const silenceRanges =
    detectSilence(
      channelData,
      audioBuffer.sampleRate
    );

  const tracks = [];

  let lastEnd = 0;

  for(const silence of silenceRanges){

    tracks.push({

      start:lastEnd,

      end:silence.start
    });

    lastEnd = silence.end;
  }

  tracks.push({

    start:lastEnd,

    end:
      audioBuffer.duration
  });

  const zip = new JSZip();

  for(
    let i=0;
    i<tracks.length;
    i++
  ){

    const track =
      tracks[i];

    progressBar.style.width =
      `${20 + (i / tracks.length) * 60}%`;

    statusPercent.textContent =
      `${Math.floor(20 + (i / tracks.length) * 60)}%`;

    statusText.textContent =
      texts[currentLang].splitting;

    const startSample =
      Math.floor(
        track.start
        * audioBuffer.sampleRate
      );

    const endSample =
      Math.floor(
        track.end
        * audioBuffer.sampleRate
      );

    const length =
      endSample - startSample;

    const newBuffer =
      audioContext.createBuffer(

        audioBuffer.numberOfChannels,

        length,

        audioBuffer.sampleRate
      );

    for(
      let ch=0;
      ch<audioBuffer.numberOfChannels;
      ch++
    ){

      const oldData =
        audioBuffer.getChannelData(ch);

      const newData =
        newBuffer.getChannelData(ch);

      for(
        let j=0;
        j<length;
        j++
      ){

        let sample =
          oldData[startSample + j];

        // normalize

        if(
          normalizeToggle.checked
        ){

          sample *= 1.2;
        }

        // fade out

        const fadeSamples =
          (fadeRange.value / 1000)
          * audioBuffer.sampleRate;

        if(
          j > length - fadeSamples
        ){

          const fadePos =
            (length - j)
            / fadeSamples;

          sample *= fadePos;
        }

        newData[j] = sample;
      }
    }

    const wav =
      audioBufferToWav(newBuffer);

    const mp3 =
      wavToMp3(
        wav,
        audioBuffer.numberOfChannels,
        audioBuffer.sampleRate
      );

    const filename =
      String(i + 1)
      .padStart(2,"0")
      + ".mp3";

    zip.file(
      filename,
      mp3
    );
  }

  progressBar.style.width = "90%";

  statusPercent.textContent = "90%";

  statusText.textContent =
    texts[currentLang].zipping;

  zipBlob =
    await zip.generateAsync({
      type:"blob"
    });

  progressBar.style.width = "100%";

  statusPercent.textContent = "100%";

  resultBox.style.display = "block";

  resultDesc.textContent =
    `${tracks.length} ${texts[currentLang].complete}`;
};

downloadBtn.onclick = ()=>{

  if(!zipBlob) return;

  const a =
    document.createElement("a");

  a.href =
    URL.createObjectURL(zipBlob);

  a.download = "tracks.zip";

  a.click();
};

</script>

</body>
</html>
